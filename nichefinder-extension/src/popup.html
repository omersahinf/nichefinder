<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NicheFinder</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #f5f5f5;
      padding: 16px;
      width: 320px;
      min-height: 200px;
    }
    
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    
    .logo {
      font-weight: 700;
      font-size: 16px;
      color: #f87171;
    }
    
    .search-form {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    
    .search-input {
      flex: 1;
      background: #171717;
      border: 1px solid #404040;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 13px;
      color: #f5f5f5;
      outline: none;
    }
    
    .search-input:focus {
      border-color: #f87171;
    }
    
    .search-btn {
      background: #dc2626;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    
    .search-btn:hover {
      background: #b91c1c;
    }
    
    .search-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .error {
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid #7f1d1d;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 12px;
      color: #fca5a5;
    }
    
    .results {
      max-height: 300px;
      overflow-y: auto;
    }
    
    .result-item {
      background: #171717;
      border: 1px solid #262626;
      border-radius: 6px;
      padding: 8px 12px;
      margin-bottom: 8px;
    }
    
    .result-title {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 4px;
      line-height: 1.4;
    }
    
    .result-title a {
      color: #f5f5f5;
      text-decoration: none;
    }
    
    .result-title a:hover {
      color: #f87171;
    }
    
    .result-meta {
      font-size: 11px;
      color: #737373;
    }
    
    .result-outlier {
      color: #f87171;
      font-weight: 600;
    }
    
    .loading {
      text-align: center;
      padding: 16px;
      color: #737373;
      font-size: 13px;
    }
    
    .config-link {
      margin-top: 12px;
      font-size: 11px;
      color: #737373;
    }
    
    .config-link a {
      color: #f87171;
      text-decoration: none;
    }
    
    .config-link a:hover {
      color: #fca5a5;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">NicheFinder</span>
  </div>
  
  <form class="search-form" id="searchForm">
    <input type="text" class="search-input" id="searchInput" placeholder="Search niche..." autofocus>
    <button type="submit" class="search-btn" id="searchBtn">Search</button>
  </form>
  
  <div id="results"></div>
  
  <div class="config-link">
    <a href="options.html" target="_blank">Configure API key</a>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
