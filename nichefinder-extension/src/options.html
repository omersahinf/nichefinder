<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NicheFinder Extension Settings</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #f5f5f5;
      padding: 32px;
      max-width: 480px;
      margin: 0 auto;
    }
    
    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #f87171;
    }
    
    p {
      font-size: 14px;
      color: #737373;
      margin-bottom: 24px;
      line-height: 1.6;
    }
    
    .form-group {
      margin-bottom: 16px;
    }
    
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #a3a3a3;
    }
    
    input[type="text"] {
      width: 100%;
      background: #171717;
      border: 1px solid #404040;
      border-radius: 6px;
      padding: 12px 16px;
      font-size: 14px;
      color: #f5f5f5;
      outline: none;
    }
    
    input[type="text"]:focus {
      border-color: #f87171;
    }
    
    .hint {
      font-size: 12px;
      color: #525252;
      margin-top: 8px;
    }
    
    .hint a {
      color: #f87171;
    }
    
    button {
      background: #dc2626;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }
    
    button:hover {
      background: #b91c1c;
    }
    
    .status {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 6px;
      font-size: 13px;
    }
    
    .status.success {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid #166534;
      color: #86efac;
    }
    
    .status.error {
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid #7f1d1d;
      color: #fca5a5;
    }
  </style>
</head>
<body>
  <h1>NicheFinder Extension</h1>
  <p>Configure your API key to use the extension. Get your key from <a href="https://nichefinder.ai/account/api-keys" target="_blank">NicheFinder API Keys</a>.</p>
  
  <div class="form-group">
    <label for="apiKey">API Key</label>
    <input type="text" id="apiKey" placeholder="nf_live_...">
    <div class="hint">Your Bearer token from <a href="https://nichefinder.ai/account/api-keys" target="_blank">/account/api-keys</a></div>
  </div>
  
  <div class="form-group">
    <label for="apiBaseUrl">API Base URL (optional)</label>
    <input type="text" id="apiBaseUrl" placeholder="https://nichefinder.ai">
    <div class="hint">Override for local development</div>
  </div>
  
  <button id="saveBtn">Save Settings</button>
  
  <div id="status"></div>
  
  <script src="options.js"></script>
</body>
</html>
